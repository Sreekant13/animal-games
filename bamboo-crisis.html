<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bamboo Crisis</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a1a0a;color:#e8f5e9;font-family:'Segoe UI',Arial,sans-serif;display:flex;flex-direction:column;height:100vh;overflow:hidden}
#topbar{background:#071207;border-bottom:2px solid #2E7D32;padding:6px 14px;display:flex;gap:18px;align-items:center;flex-shrink:0}
.stat{display:flex;flex-direction:column;align-items:center;min-width:60px}
.sv{font-size:17px;font-weight:bold;color:#A5D6A7}
.sl{font-size:9px;color:#558B2F;text-transform:uppercase;letter-spacing:1px}
#ttl{color:#7CFC00;font-size:15px;font-weight:bold;letter-spacing:2px;margin-right:8px;flex-shrink:0}
.warn{color:#FF8F00!important}
.crit{color:#F44336!important;animation:blink .8s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
#main{display:flex;flex:1;overflow:hidden}
#mapwrap{position:relative;flex-shrink:0}
canvas{display:block;cursor:crosshair}
#sidebar{width:230px;background:#071207;border-left:2px solid #1B5E20;display:flex;flex-direction:column;padding:8px;gap:6px;overflow-y:auto;flex-shrink:0}
.card{background:#0d1f0d;border:1px solid #2E7D32;border-radius:7px;padding:8px}
.ch{font-size:10px;text-transform:uppercase;color:#558B2F;letter-spacing:1px;margin-bottom:6px}
.btn{width:100%;padding:7px 8px;border:none;border-radius:5px;cursor:pointer;font-size:11px;font-weight:bold;letter-spacing:.4px;margin-bottom:3px;transition:filter .15s,transform .1s;text-align:left}
.btn:hover:not(:disabled){filter:brightness(1.25);transform:translateX(2px)}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn.active{outline:2px solid #FFD700}
.bg{background:#2E7D32;color:#C8E6C9}
.bb{background:#5D4037;color:#EFEBE9}
.bc{background:#1565C0;color:#BBDEFB}
.bo{background:#E65100;color:#FFE0B2}
.br{background:#880E4F;color:#FCE4EC}
.bcost{float:right;opacity:.6;font-weight:normal}
#log{background:#071207;border-top:2px solid #1B5E20;padding:6px 12px;height:60px;overflow-y:auto;flex-shrink:0}
#log div{font-size:10px;padding:1px 0;border-bottom:1px solid #0a150a}
.lg{color:#81C784}.lb{color:#EF9A9A}.li{color:#90CAF9}.lw{color:#FFD54F}
#ov{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0a1a0a;border:2px solid #F44336;border-radius:12px;padding:22px;z-index:200;width:320px;text-align:center;box-shadow:0 0 40px rgba(244,67,54,.5)}
#ov h2{margin-bottom:8px}
#ov p{color:#BDBDBD;font-size:12px;margin-bottom:14px;line-height:1.5}
#ovb{display:flex;gap:8px;justify-content:center;flex-wrap:wrap}
.ob{padding:8px 16px;border:none;border-radius:6px;cursor:pointer;font-weight:bold;font-size:12px}
.tt{position:absolute;background:#071207;border:1px solid #4CAF50;border-radius:5px;padding:5px 8px;font-size:10px;color:#C8E6C9;pointer-events:none;z-index:100;display:none;max-width:140px;line-height:1.5}
#mind{position:absolute;top:6px;left:6px;background:rgba(0,0,0,.8);border:1px solid #4CAF50;border-radius:4px;padding:3px 7px;font-size:10px;color:#A5D6A7;display:none;pointer-events:none}
</style>
</head>
<body>
<div id="topbar">
  <span id="ttl">🐼 BAMBOO CRISIS</span>
  <div class="stat"><span class="sv" id="smo">Year 1, Mo 1</span><span class="sl">Time</span></div>
  <div class="stat"><span class="sv" id="sfn">$500</span><span class="sl">Funds</span></div>
  <div class="stat"><span class="sv" id="spd">0</span><span class="sl">Pandas</span></div>
  <div class="stat"><span class="sv" id="sin">+$0</span><span class="sl">Income/mo</span></div>
  <div class="stat"><span class="sv" id="sth">Low</span><span class="sl">City Threat</span></div>
  <div class="stat" style="margin-left:auto"><span class="sv" id="sgl">0/15</span><span class="sl">Win Goal</span></div>
</div>
<div id="main">
  <div id="mapwrap">
    <canvas id="map"></canvas>
    <div id="mind"></div>
    <div class="tt" id="tt"></div>
  </div>
  <div id="sidebar">
    <div class="card">
      <div class="ch">Actions</div>
      <button class="btn bg" id="bpl" onclick="setMode('plant')">🎋 Plant Bamboo <span class="bcost">$40</span></button>
      <button class="btn bb" id="bbr" onclick="setMode('barrier')">🧱 Build Barrier <span class="bcost">$90</span></button>
      <button class="btn bc" id="bne" onclick="doNegotiate()">🤝 Negotiate <span class="bcost">$120</span></button>
      <button class="btn bo" id="bca" onclick="doCampaign()">📢 Public Campaign <span class="bcost">$60</span></button>
      <button class="btn br" id="bem" onclick="doEmergency()">🚨 Emergency Grant <span class="bcost">Free×1</span></button>
    </div>
    <div class="card">
      <div class="ch">Research</div>
      <button class="btn bg" id="rhe" onclick="doResearch('health')">🧬 Panda Resilience <span class="bcost">$200</span></button>
      <button class="btn bo" id="rto" onclick="doResearch('tourism')">📸 Eco-Tourism <span class="bcost">$250</span></button>
      <button class="btn bc" id="rco" onclick="doResearch('corridor')">🌿 Corridor Growth <span class="bcost">$300</span></button>
    </div>
    <div class="card">
      <div class="ch">Sanctuary</div>
      <div id="sdtl" style="font-size:11px;line-height:1.9;color:#A5D6A7"></div>
    </div>
    <div class="card">
      <div class="ch">Selected Cell</div>
      <div id="cinf" style="font-size:11px;color:#A5D6A7;line-height:1.7">Click map to inspect</div>
    </div>
    <div class="card" style="font-size:10px;color:#558B2F;line-height:1.8">
      <b style="color:#81C784">Keys:</b><br>
      P — Pause/Resume<br>
      Esc — Cancel mode<br>
      <b style="color:#81C784">Goal:</b> 15 pandas survive 60 months
    </div>
  </div>
</div>
<div id="log"><div class="li">🐼 Welcome! Protect your pandas from urban encroachment.</div></div>
<div id="ov"><h2 id="ovt"></h2><p id="ovd"></p><div id="ovb"></div></div>

<script>
// ── Constants ──────────────────────────────────────────────────────
const COLS=22,ROWS=15,CS=32;
const W=COLS*CS,H=ROWS*CS;
const EMPTY=0,BAMBOO=1,CITY=2,BARRIER=3,WATER=4;
const CLR={[EMPTY]:'#7A8C5C',[BAMBOO]:'#2E7D32',[CITY]:'#546E7A',[BARRIER]:'#5D4037',[WATER]:'#1565C0'};

// ── State ──────────────────────────────────────────────────────────
let grid=[],pandas=[],month=0,funds=500,mode=null;
let negoMo=0,campMo=0,gameOver=false,paused=false,crisisLock=false;
let emergUsed=false,ticker=null,pandaUID=0;
let ups={health:false,tourism:false,corridor:false};

// ── Canvas ─────────────────────────────────────────────────────────
const canvas=document.getElementById('map');
canvas.width=W; canvas.height=H;
const ctx=canvas.getContext('2d');

// ── Grid ───────────────────────────────────────────────────────────
function makeGrid(){
  grid=[];
  for(let r=0;r<ROWS;r++){
    grid[r]=[];
    for(let c=0;c<COLS;c++){
      const ed=Math.min(r,ROWS-1-r,c,COLS-1-c);
      grid[r][c]={type: ed<2?CITY : ed<3&&Math.random()<.55?CITY : EMPTY};
    }
  }
  // Core bamboo zone
  for(let r=4;r<ROWS-4;r++)
    for(let c=5;c<COLS-5;c++)
      if(Math.random()<.68) grid[r][c]={type:BAMBOO};
  // River
  const rc=3+Math.floor(Math.random()*3);
  for(let r=1;r<ROWS-1;r++){
    grid[r][rc]={type:WATER};
    if(Math.random()<.45&&rc+1<COLS-1) grid[r][rc+1]={type:WATER};
  }
  // Pond
  const pr=2+Math.floor(Math.random()*3),pc=6+Math.floor(Math.random()*5);
  for(let dr=0;dr<2;dr++) for(let dc=0;dc<3;dc++) grid[pr+dr][pc+dc]={type:WATER};
}

// ── Pandas ─────────────────────────────────────────────────────────
function addPanda(r,c){
  pandas.push({id:pandaUID++,r,c,hunger:15+Math.random()*20,stress:5+Math.random()*15,health:80+Math.random()*20,age:0});
}

function placePandas(){
  const spots=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) if(grid[r][c].type===BAMBOO) spots.push([r,c]);
  shuffle(spots);
  for(let i=0;i<6&&i<spots.length;i++) addPanda(spots[i][0],spots[i][1]);
}

// ── Helpers ────────────────────────────────────────────────────────
function shuffle(a){for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}return a;}
function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function adj(r,c){return[[r-1,c],[r+1,c],[r,c-1],[r,c+1]].filter(([rr,cc])=>rr>=0&&rr<ROWS&&cc>=0&&cc<COLS);}
function nearBamboo(r,c,d=1){for(let dr=-d;dr<=d;dr++)for(let dc=-d;dc<=d;dc++){const rr=r+dr,cc=c+dc;if(rr>=0&&rr<ROWS&&cc>=0&&cc<COLS&&grid[rr][cc].type===BAMBOO)return true;}return false;}
function countType(t){let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c].type===t)n++;return n;}
function calcIncome(){return 30+pandas.length*(ups.tourism?26:14);}

// ── Drawing ────────────────────────────────────────────────────────
function drawCell(r,c){
  const x=c*CS,y=r*CS,t=grid[r][c].type;
  ctx.fillStyle=CLR[t]||'#333';
  ctx.fillRect(x,y,CS,CS);

  if(t===BAMBOO){
    ctx.strokeStyle='#1B5E20';ctx.lineWidth=.4;ctx.strokeRect(x,y,CS,CS);
    // stalks
    ctx.fillStyle='#66BB6A';
    ctx.fillRect(x+CS*.32,y+2,3,CS-4);
    ctx.fillRect(x+CS*.6,y+2,3,CS-4);
    ctx.fillStyle='#4CAF50';
    for(let i=1;i<3;i++){ctx.fillRect(x+CS*.3,y+i*(CS/3),7,2);ctx.fillRect(x+CS*.58,y+i*(CS/3)+4,7,2);}
    if((r+c)%3===0){ctx.fillStyle='#A5D6A7';ctx.beginPath();ctx.ellipse(x+CS*.5,y+5,6,3,.4,0,Math.PI*2);ctx.fill();}
  } else if(t===CITY){
    ctx.strokeStyle='#455A64';ctx.lineWidth=.4;ctx.strokeRect(x,y,CS,CS);
    ctx.fillStyle='#607D8B';
    ctx.fillRect(x+3,y+CS-10,7,10);ctx.fillRect(x+12,y+CS-14,8,14);ctx.fillRect(x+CS-11,y+CS-8,8,8);
    ctx.fillStyle='rgba(255,249,196,.7)';
    ctx.fillRect(x+4,y+CS-9,2,2);ctx.fillRect(x+7,y+CS-9,2,2);
    ctx.fillRect(x+13,y+CS-12,2,2);ctx.fillRect(x+17,y+CS-12,2,2);
  } else if(t===WATER){
    ctx.fillStyle='#1976D2';ctx.fillRect(x,y,CS,CS);
    ctx.strokeStyle='#64B5F6';ctx.lineWidth=1;
    for(let i=1;i<3;i++){ctx.beginPath();ctx.moveTo(x+3,y+i*(CS/3));ctx.quadraticCurveTo(x+CS/2,y+i*(CS/3)-3,x+CS-3,y+i*(CS/3));ctx.stroke();}
  } else if(t===BARRIER){
    ctx.strokeStyle='#4E342E';ctx.lineWidth=.4;ctx.strokeRect(x,y,CS,CS);
    ctx.fillStyle='#8D6E63';
    for(let row=0;row<3;row++){const off=row%2===0?0:CS/2;ctx.fillRect(x+(off%CS),y+row*10+2,CS/2-2,7);if(off===0)ctx.fillRect(x+CS/2+1,y+row*10+2,CS/2-2,7);}
  } else {
    // empty grass
    ctx.strokeStyle='#5C7A40';ctx.lineWidth=.3;ctx.strokeRect(x,y,CS,CS);
    if((r*7+c*13)%9===0){ctx.fillStyle='#6A8C4A';ctx.fillRect(x+4,y+CS-5,2,5);ctx.fillRect(x+8,y+CS-7,2,7);ctx.fillRect(x+CS-6,y+CS-4,2,4);}
  }
}

function drawPanda(p){
  const x=p.c*CS+CS/2,y=p.r*CS+CS/2,s=CS*.3;
  // health ring
  const h=p.health;
  ctx.strokeStyle=h>60?'#4CAF50':h>30?'#FF9800':'#F44336';
  ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(x,y,s+3.5,0,Math.PI*2);ctx.stroke();
  // body
  ctx.fillStyle='white';ctx.beginPath();ctx.arc(x,y+1,s,0,Math.PI*2);ctx.fill();
  // head
  ctx.beginPath();ctx.arc(x,y-s*.7,s*.76,0,Math.PI*2);ctx.fill();
  // ears
  ctx.fillStyle='#1a1a1a';
  ctx.beginPath();ctx.arc(x-s*.54,y-s*1.26,s*.29,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+s*.54,y-s*1.26,s*.29,0,Math.PI*2);ctx.fill();
  // eye patches
  ctx.beginPath();ctx.arc(x-s*.3,y-s*.78,s*.25,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+s*.3,y-s*.78,s*.25,0,Math.PI*2);ctx.fill();
  // eyes
  ctx.fillStyle='white';
  ctx.beginPath();ctx.arc(x-s*.28,y-s*.8,s*.12,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+s*.28,y-s*.8,s*.12,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.arc(x-s*.26,y-s*.78,s*.07,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+s*.3,y-s*.78,s*.07,0,Math.PI*2);ctx.fill();
  // nose
  ctx.fillStyle='#555';ctx.beginPath();ctx.arc(x,y-s*.58,s*.1,0,Math.PI*2);ctx.fill();
  // arms
  ctx.fillStyle='#1a1a1a';
  ctx.save();ctx.translate(x-s*.95,y+s*.2);ctx.rotate(-.3);ctx.beginPath();ctx.ellipse(0,0,s*.22,s*.55,0,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(x+s*.95,y+s*.2);ctx.rotate(.3);ctx.beginPath();ctx.ellipse(0,0,s*.22,s*.55,0,0,Math.PI*2);ctx.fill();ctx.restore();
  // legs
  ctx.beginPath();ctx.arc(x-s*.3,y+s*1.1,s*.32,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(x+s*.3,y+s*1.1,s*.32,0,Math.PI*2);ctx.fill();
  // hunger bar
  const bw=CS*.7,bx=x-bw/2,by=y+s+5;
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(bx,by,bw,3);
  ctx.fillStyle=p.hunger<60?'#4CAF50':p.hunger<80?'#FF9800':'#F44336';
  ctx.fillRect(bx,by,bw*(1-p.hunger/100),3);
}

function drawCityThreats(){
  ctx.strokeStyle='rgba(244,67,54,.6)';ctx.lineWidth=1.5;
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(grid[r][c].type===CITY){
      const border=adj(r,c).some(([rr,cc])=>grid[rr][cc].type!==CITY&&grid[rr][cc].type!==WATER);
      if(border){ctx.strokeRect(c*CS+1,r*CS+1,CS-2,CS-2);}
    }
  }
}

function drawModeHint(){
  if(!mode)return;
  ctx.fillStyle=mode==='plant'?'rgba(76,175,80,.22)':'rgba(93,64,55,.28)';
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    const t=grid[r][c].type;
    if(mode==='plant'&&t===EMPTY) ctx.fillRect(c*CS,r*CS,CS,CS);
    if(mode==='barrier'&&(t===EMPTY||t===BAMBOO)){
      if(adj(r,c).some(([rr,cc])=>grid[rr][cc].type===CITY)) ctx.fillRect(c*CS,r*CS,CS,CS);
    }
  }
}

function render(){
  ctx.clearRect(0,0,W,H);
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++) drawCell(r,c);
  drawCityThreats();
  drawModeHint();
  pandas.forEach(drawPanda);
}

// ── Month Tick ─────────────────────────────────────────────────────
function tick(){
  if(gameOver||paused||crisisLock)return;
  month++;
  funds+=calcIncome();
  if(negoMo>0)negoMo--;
  if(campMo>0)campMo--;
  movePandas();
  feedPandas();
  breedPandas();
  expandCity();
  if(ups.corridor&&Math.random()<.3)growCorridor();
  if(month>3&&Math.random()<.18) triggerCrisis();
  checkEnd();
  updateUI();
  render();
}

// ── Panda AI ───────────────────────────────────────────────────────
function movePandas(){
  pandas.forEach(p=>{
    const options=adj(p.r,p.c).filter(([rr,cc])=>{const t=grid[rr][cc].type;return t===BAMBOO||t===EMPTY;});
    if(!options.length)return;
    const bambooOpts=options.filter(([rr,cc])=>grid[rr][cc].type===BAMBOO);
    const pool=(bambooOpts.length>0&&p.hunger>25)?bambooOpts:options;
    const[nr,nc]=pool[Math.floor(Math.random()*pool.length)];
    p.r=nr;p.c=nc;
  });
}

function feedPandas(){
  pandas.forEach(p=>{
    p.hunger+=12;
    const onB=grid[p.r][p.c].type===BAMBOO;
    const nearB=nearBamboo(p.r,p.c,1);
    if(onB)p.hunger-=24;
    else if(nearB)p.hunger-=11;
    p.hunger=clamp(p.hunger,0,100);

    if(!nearB)p.stress+=16; else p.stress-=6;
    if(grid[p.r][p.c].type===CITY)p.stress+=20;
    p.stress=clamp(p.stress,0,100);

    const dmg=ups.health?.45:1;
    if(p.hunger>78)p.health-=8*dmg;
    if(p.stress>72)p.health-=5*dmg;
    if(p.hunger<40&&p.stress<35)p.health=Math.min(100,p.health+4);
    p.health=clamp(p.health,0,100);
    p.age++;
    if(p.age>168)p.health-=3; // ~14yr lifespan
  });
  const before=pandas.length;
  pandas=pandas.filter(p=>p.health>0);
  const died=before-pandas.length;
  if(died>0)addLog(`💀 ${died} panda${died>1?'s':''} perished.`,'b');
}

function breedPandas(){
  if(pandas.length<2)return;
  for(let i=0;i<pandas.length;i++){
    for(let j=i+1;j<pandas.length;j++){
      const a=pandas[i],b=pandas[j];
      if(Math.abs(a.r-b.r)<=1&&Math.abs(a.c-b.c)<=1
        &&a.stress<42&&b.stress<42&&a.health>55&&b.health>55
        &&a.age>18&&b.age>18&&Math.random()<.18){
        const spots=adj(a.r,a.c).filter(([rr,cc])=>grid[rr][cc].type===BAMBOO);
        const[nr,nc]=spots.length?spots[0]:[a.r,a.c];
        addPanda(nr,nc);
        addLog(`🍼 A cub was born! Pandas: ${pandas.length}`,'g');
        a.stress+=8;b.stress+=8;
        return; // one birth per tick
      }
    }
  }
}

// ── City Expansion ─────────────────────────────────────────────────
function expandCity(){
  let base=.16;
  if(negoMo>0)base*=.38;
  if(campMo>0)base*=.6;
  base=Math.min(base,.38);

  const cands=[];
  for(let r=0;r<ROWS;r++) for(let c=0;c<COLS;c++){
    if(grid[r][c].type!==CITY&&grid[r][c].type!==WATER){
      const ca=adj(r,c).filter(([rr,cc])=>grid[rr][cc].type===CITY);
      if(ca.length){
        let ch=base*ca.length*.65;
        if(grid[r][c].type===BARRIER)ch*=.08;
        cands.push({r,c,ch});
      }
    }
  }
  let n=0;
  cands.forEach(({r,c,ch})=>{
    if(Math.random()<ch){
      grid[r][c]={type:CITY};
      pandas.filter(p=>p.r===r&&p.c===c).forEach(p=>{
        const safe=adj(r,c).filter(([rr,cc])=>grid[rr][cc].type!==CITY);
        if(safe.length){const[nr,nc]=safe[0];p.r=nr;p.c=nc;}
        p.stress+=30;
      });
      n++;
    }
  });
  if(n>0)addLog(`🏗️ City consumed ${n} cell${n>1?'s':''}!`,'b');
}

function growCorridor(){
  const emp=[];
  for(let r=1;r<ROWS-1;r++) for(let c=1;c<COLS-1;c++){
    if(grid[r][c].type===EMPTY&&nearBamboo(r,c,1)&&!adj(r,c).some(([rr,cc])=>grid[rr][cc].type===CITY))
      emp.push([r,c]);
  }
  if(emp.length&&Math.random()<.45){
    const[r,c]=emp[Math.floor(Math.random()*emp.length)];
    grid[r][c]={type:BAMBOO};
    addLog('🌱 Bamboo corridor expanded naturally.','g');
  }
}

// ── Crises ─────────────────────────────────────────────────────────
const CRISES=[
  {title:'🦠 Disease Outbreak',desc:'Illness spreading through the bamboo forest, weakening your pandas.',ops:[
    {l:'Quarantine ($80)',cost:80,fn:()=>{pandas.forEach(p=>{p.health-=12;p.stress+=10;});addLog('🦠 Quarantine limited damage.','w');}},
    {l:'Ignore (risky)',cost:0,fn:()=>{pandas.forEach(p=>{p.health-=35;p.stress+=22;});addLog('🦠 Disease ravaged pandas!','b');}}
  ]},
  {title:'☀️ Bamboo Drought',desc:'Severe drought is killing bamboo. You must act immediately.',ops:[
    {l:'Emergency Irrigation ($100)',cost:100,fn:()=>{addLog('💧 Irrigation saved the bamboo.','g');}},
    {l:'Do nothing',cost:0,fn:()=>{let k=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c].type===BAMBOO&&Math.random()<.38){grid[r][c]={type:EMPTY};k++;}addLog(`☀️ Drought killed ${k} bamboo cells.`,'b');}}
  ]},
  {title:'🔫 Poachers Sighted!',desc:'Poachers have been spotted near the border. Pandas are at risk.',ops:[
    {l:'Hire Rangers ($120)',cost:120,fn:()=>{addLog('👮 Rangers drove off poachers.','g');}},
    {l:'Call Police (free, risky)',cost:0,fn:()=>{if(Math.random()<.45&&pandas.length>0){pandas.splice(Math.floor(Math.random()*pandas.length),1);addLog('🔫 A panda was taken.','b');}else addLog('🚓 Police arrived in time.','g');}}
  ]},
  {title:'🏢 Developer Rezoning!',desc:'A developer is lobbying to convert your buffer zone into housing.',ops:[
    {l:'Legal Challenge ($150)',cost:150,fn:()=>{negoMo+=5;addLog('⚖️ Challenge stalled development 5 months.','g');}},
    {l:'Accept compromise',cost:0,fn:()=>{let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c].type===EMPTY&&adj(r,c).some(([rr,cc])=>grid[rr][cc].type===CITY)&&n<7){grid[r][c]={type:CITY};n++;}addLog(`🏢 Developer rezoned ${n} buffer cells.`,'b');}}
  ]},
  {title:'📺 Documentary Crew',desc:'A film crew wants to shoot a viral climate documentary at your sanctuary!',ops:[
    {l:'Welcome them! (+$320)',cost:0,fn:()=>{funds+=320;addLog('📺 Documentary raised $320 in donations!','g');}},
    {l:'Decline (avoid panda stress)',cost:0,fn:()=>{addLog('🙅 Crew declined. Pandas undisturbed.','i');}}
  ]},
  {title:'🌊 Flash Flood Warning',desc:'Torrential rain threatens to flood low-lying bamboo zones.',ops:[
    {l:'Dig drainage ($90)',cost:90,fn:()=>{addLog('🌿 Drainage protected the bamboo.','g');}},
    {l:'Hope for the best',cost:0,fn:()=>{let n=0;for(let r=ROWS-5;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c].type===BAMBOO&&Math.random()<.42){grid[r][c]={type:WATER};n++;}addLog(`🌊 Flood converted ${n} bamboo cells.`,'b');}}
  ]},
  {title:'🏛️ Government Grant!',desc:'A conservation agency is offering an emergency matching grant.',ops:[
    {l:'Apply now (+$280)',cost:0,fn:()=>{funds+=280;addLog('🏛️ Conservation grant awarded: +$280!','g');}},
    {l:'Redirect effort elsewhere',cost:0,fn:()=>{addLog('📋 Grant declined.','i');}}
  ]},
  {title:'🐘 Invasive Species',desc:'An invasive plant is choking bamboo roots throughout the sanctuary.',ops:[
    {l:'Eradication ($110)',cost:110,fn:()=>{addLog('🌿 Invasive species removed.','g');}},
    {l:'Let it spread',cost:0,fn:()=>{let n=0;for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++)if(grid[r][c].type===BAMBOO&&Math.random()<.25){grid[r][c]={type:EMPTY};n++;}addLog(`🌿 Invasive plant damaged ${n} bamboo cells.`,'b');}}
  ]}
];

function triggerCrisis(){
  if(crisisLock)return;
  crisisLock=true; paused=true;
  const cr=CRISES[Math.floor(Math.random()*CRISES.length)];
  document.getElementById('ovt').textContent=cr.title;
  document.getElementById('ovt').style.color='#F44336';
  document.getElementById('ovd').textContent=cr.desc;
  const ob=document.getElementById('ovb'); ob.innerHTML='';
  cr.ops.forEach(op=>{
    const btn=document.createElement('button');
    btn.className='ob';
    btn.style.background=op.cost>0?'#1565C0':'#2E7D32';
    btn.style.color='white';
    btn.textContent=op.label||op.l;
    if(op.cost>0&&funds<op.cost){btn.disabled=true;btn.style.opacity='.4';}
    btn.onclick=()=>{
      if(op.cost>0)funds-=op.cost;
      op.fn();
      document.getElementById('ov').style.display='none';
      crisisLock=false; paused=false;
      updateUI(); render();
    };
    ob.appendChild(btn);
  });
  document.getElementById('ov').style.display='block';
}

// ── Player Actions ─────────────────────────────────────────────────
function setMode(m){
  mode=mode===m?null:m;
  const el=document.getElementById('mind');
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  if(mode){
    el.style.display='block';
    el.textContent=mode==='plant'?'🎋 Click empty cells to plant bamboo ($40 each)':'🧱 Click cells adjacent to city ($90 each)';
    document.getElementById(mode==='plant'?'bpl':'bbr').classList.add('active');
  } else el.style.display='none';
  render();
}

function doNegotiate(){
  if(funds<120){addLog('⚠️ Need $120 to negotiate.','w');return;}
  funds-=120; negoMo+=5;
  addLog('🤝 Deal struck! City expansion reduced for 5 months.','g');
  updateUI();
}

function doCampaign(){
  if(funds<60){addLog('⚠️ Need $60 for campaign.','w');return;}
  funds-=60; campMo+=4;
  addLog('📢 Public campaign launched! Expansion slowed 4 months.','g');
  updateUI();
}

function doEmergency(){
  if(emergUsed){addLog('⚠️ Emergency grant already used.','w');return;}
  emergUsed=true; funds+=250;
  addLog('🚨 Emergency conservation grant: +$250! (One-time)','g');
  updateUI();
}

function doResearch(type){
  if(ups[type]){addLog('Already researched.','i');return;}
  const costs={health:200,tourism:250,corridor:300};
  const cost=costs[type];
  if(funds<cost){addLog(`⚠️ Need $${cost} for research.`,'w');return;}
  funds-=cost; ups[type]=true;
  const el=document.getElementById('r'+type.slice(0,2));
  if(el){el.disabled=true;el.style.opacity='.4';}
  const nm={health:'Panda Resilience',tourism:'Eco-Tourism',corridor:'Corridor Growth'};
  addLog(`🔬 Unlocked: ${nm[type]}!`,'g');
  updateUI();
}

// ── Win/Lose ───────────────────────────────────────────────────────
function checkEnd(){
  if(gameOver)return;
  if(pandas.length===0){endGame(false,'All pandas have died. The sanctuary stands empty. 💔');return;}
  if(countType(BAMBOO)<4){addLog('⚠️ CRITICAL: Bamboo almost gone!','w');}
  if(countType(CITY)>COLS*ROWS*.87){endGame(false,'The city consumed the entire sanctuary. 🏙️');return;}
  if(pandas.length>=15&&month>=60){endGame(true,`Victory! ${pandas.length} pandas thrive after ${month} months of conservation! 🎉`);}
}

function endGame(won,msg){
  gameOver=true; paused=true;
  clearInterval(ticker);
  document.getElementById('ovt').textContent=won?'🎉 Victory!':'💔 Sanctuary Lost';
  document.getElementById('ovt').style.color=won?'#4CAF50':'#F44336';
  document.getElementById('ovd').textContent=msg;
  const ob=document.getElementById('ovb'); ob.innerHTML='';
  const rb=document.createElement('button');
  rb.className='ob'; rb.style.background='#2E7D32'; rb.style.color='white';
  rb.textContent='Play Again';
  rb.onclick=()=>{document.getElementById('ov').style.display='none';initGame();};
  ob.appendChild(rb);
  document.getElementById('ov').style.display='block';
  addLog(msg,won?'g':'b');
}

// ── UI ──────────────────────────────────────────────────────────────
function addLog(msg,type='i'){
  const el=document.getElementById('log');
  const d=document.createElement('div');
  d.className='l'+type;
  d.textContent=`Mo.${month} — ${msg}`;
  el.insertBefore(d,el.firstChild);
  while(el.children.length>25)el.removeChild(el.lastChild);
}

function updateUI(){
  const yr=Math.floor(month/12)+1,mo=month%12+1;
  document.getElementById('smo').textContent=`Year ${yr}, Mo ${mo}`;
  document.getElementById('sfn').textContent=`$${funds}`;
  document.getElementById('spd').textContent=pandas.length;
  document.getElementById('sin').textContent=`+$${calcIncome()}`;

  const threat=negoMo>0||campMo>0?'Low':'Medium';
  const te=document.getElementById('sth');
  te.textContent=threat; te.className='sv'+(threat==='Low'?'':' warn');

  const ge=document.getElementById('sgl');
  ge.textContent=`${pandas.length}/15`;
  ge.className='sv'+(pandas.length>=15?' lg':'');

  const ah=pandas.length?Math.round(pandas.reduce((s,p)=>s+p.hunger,0)/pandas.length):0;
  const as_=pandas.length?Math.round(pandas.reduce((s,p)=>s+p.stress,0)/pandas.length):0;
  const aH=pandas.length?Math.round(pandas.reduce((s,p)=>s+p.health,0)/pandas.length):0;
  document.getElementById('sdtl').innerHTML=
    `🎋 Bamboo: ${countType(BAMBOO)} cells<br>`+
    `🏙️ City: ${countType(CITY)} cells<br>`+
    `🐼 Pandas: ${pandas.length}<br>`+
    `🍽️ Avg Hunger: ${ah}%<br>`+
    `😰 Avg Stress: ${as_}%<br>`+
    `❤️ Avg Health: ${aH}%<br>`+
    `🤝 Negotiation: ${negoMo>0?negoMo+' mo left':'—'}<br>`+
    `📢 Campaign: ${campMo>0?campMo+' mo left':'—'}`;

  document.getElementById('bpl').disabled=funds<40;
  document.getElementById('bbr').disabled=funds<90;
  document.getElementById('bne').disabled=funds<120;
  document.getElementById('bca').disabled=funds<60;
  document.getElementById('bem').disabled=emergUsed;
  if(!ups.health) document.getElementById('rhe').disabled=funds<200;
  if(!ups.tourism) document.getElementById('rto').disabled=funds<250;
  if(!ups.corridor) document.getElementById('rco').disabled=funds<300;
}

// ── Input ──────────────────────────────────────────────────────────
canvas.addEventListener('click',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  const c=Math.floor(mx/CS),r=Math.floor(my/CS);
  if(r<0||r>=ROWS||c<0||c>=COLS)return;
  const t=grid[r][c].type;

  if(mode==='plant'){
    if(t===EMPTY&&funds>=40){grid[r][c]={type:BAMBOO};funds-=40;addLog(`🎋 Bamboo planted (${c},${r}).`,'g');updateUI();render();}
    else if(funds<40)addLog('⚠️ Need $40 to plant bamboo.','w');
    else addLog('Can only plant on empty cells.','i');
  } else if(mode==='barrier'){
    const ac=adj(r,c).some(([rr,cc])=>grid[rr][cc].type===CITY);
    if((t===EMPTY||t===BAMBOO)&&ac&&funds>=90){grid[r][c]={type:BARRIER};funds-=90;addLog(`🧱 Barrier built (${c},${r}).`,'g');updateUI();render();}
    else if(!ac)addLog('Barriers must touch city cells.','w');
    else if(funds<90)addLog('⚠️ Need $90 for barrier.','w');
  } else {
    const nm={[EMPTY]:'Empty Grass',[BAMBOO]:'Bamboo Forest',[CITY]:'Urban Area',[BARRIER]:'Barrier Wall',[WATER]:'River/Water'};
    const here=pandas.filter(p=>p.r===r&&p.c===c);
    let html=`<b>${nm[t]||'?'}</b><br>`;
    if(here.length) html+=here.map(p=>`Panda HP:${Math.round(p.health)}% | Hunger:${Math.round(p.hunger)}%`).join('<br>');
    else html+='No pandas here';
    document.getElementById('cinf').innerHTML=html;
  }
});

canvas.addEventListener('mousemove',e=>{
  const rect=canvas.getBoundingClientRect();
  const mx=(e.clientX-rect.left)*(W/rect.width),my=(e.clientY-rect.top)*(H/rect.height);
  const c=Math.floor(mx/CS),r=Math.floor(my/CS);
  const tt=document.getElementById('tt');
  if(r<0||r>=ROWS||c<0||c>=COLS){tt.style.display='none';return;}
  const here=pandas.filter(p=>p.r===r&&p.c===c);
  const t=grid[r][c].type;
  if(here.length||t===CITY||t===BAMBOO||t===BARRIER){
    tt.style.display='block';
    tt.style.left=(c*CS+CS+4)+'px'; tt.style.top=Math.max(0,r*CS-10)+'px';
    const nm={[EMPTY]:'Grass',[BAMBOO]:'Bamboo',[CITY]:'City',[BARRIER]:'Barrier',[WATER]:'Water'};
    tt.innerHTML=`<b>${nm[t]}</b>${here.length?'<br>'+here.map(p=>`🐼 HP:${Math.round(p.health)}%`).join('<br>'):''}`;
  } else tt.style.display='none';
});

canvas.addEventListener('mouseleave',()=>document.getElementById('tt').style.display='none');

document.addEventListener('keydown',e=>{
  if(e.key==='Escape'){mode=null;setMode(null);}
  if((e.key==='p'||e.key==='P')&&!crisisLock&&!gameOver){paused=!paused;addLog(paused?'⏸ Paused':'▶ Resumed','i');}
});

// ── Init ───────────────────────────────────────────────────────────
function initGame(){
  month=0; funds=500; mode=null; negoMo=0; campMo=0;
  gameOver=false; paused=false; crisisLock=false; emergUsed=false; pandaUID=0;
  ups={health:false,tourism:false,corridor:false};
  ['he','to','co'].forEach(k=>{const el=document.getElementById('r'+k);if(el){el.disabled=false;el.style.opacity='1';}});
  document.getElementById('mind').style.display='none';
  makeGrid(); placePandas();
  updateUI(); render();
  addLog(`🐼 Sanctuary opened with ${pandas.length} pandas. Survive 60 months with 15+ pandas!`,'i');
  clearInterval(ticker);
  ticker=setInterval(tick,3000);
}

initGame();
</script>
</body>
</html>
